<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>艺风粤播 · 课时管理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;background:#f5f6fa;color:#222}
#loginPage{min-height:100vh;background:linear-gradient(135deg,#1a7a4a,#25a865);display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:#fff;border-radius:24px;padding:36px 28px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.login-logo{text-align:center;margin-bottom:14px;font-size:32px;font-weight:700;color:#1a7a4a}
.login-sub{text-align:center;font-size:13px;color:#aaa;margin-bottom:26px}
.fi{margin-bottom:13px}
.fi label{display:block;font-size:13px;color:#aaa;margin-bottom:5px;font-weight:500}
.fi input{width:100%;padding:13px 15px;border:2px solid #e0e0e0;border-radius:12px;font-size:16px;outline:none;background:#fff}
.fi input:focus{border-color:#25a865}
.login-btn{width:100%;padding:15px;background:linear-gradient(135deg,#1a7a4a,#25a865);color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;margin-top:6px}
.login-err{color:#e74c3c;font-size:13px;text-align:center;margin-top:8px}
.topbar{background:linear-gradient(135deg,#1a7a4a,#25a865);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tbl{display:flex;align-items:center;gap:10px}
.tbl span{font-size:16px;font-weight:700}
.out-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:5px 12px;border-radius:20px;font-size:13px;cursor:pointer}
.tab-bar{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;position:sticky;top:58px;z-index:99;overflow-x:auto}
.tab{flex:1;min-width:60px;padding:13px 6px;text-align:center;font-size:13px;font-weight:600;color:#aaa;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.tab.active{color:#1a7a4a;border-bottom-color:#1a7a4a}
.page{display:none;padding:16px;padding-bottom:40px}
.page.active{display:block}
.btn{padding:11px 16px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.btn-g{background:linear-gradient(135deg,#1a7a4a,#25a865);color:#fff}
.btn-b{background:linear-gradient(135deg,#2980b9,#3498db);color:#fff}
.btn-gray{background:#f0f0f0;color:#666}
.btn-block{width:100%;justify-content:center}
.btn-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.stats-row{display:flex;gap:10px;margin-bottom:16px}
.sc{flex:1;background:#fff;border-radius:14px;padding:14px 8px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.sn{font-size:26px;font-weight:700;color:#1a7a4a}
.card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.05);margin-bottom:12px}
.card-row{display:flex;justify-content:space-between;align-items:center}
.card-name{font-size:17px;font-weight:700}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;padding:20px}
.sh{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 18px}
.sheet-title{font-size:20px;font-weight:700;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:#aaa;margin-bottom:5px}
.si{width:100%;padding:13px 15px;border:2px solid #e0e0e0;border-radius:12px;font-size:16px;outline:none;margin-bottom:12px;background:#fff}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#fff;padding:12px 24px;border-radius:24px;font-size:15px;z-index:999;opacity:0;transition:opacity .2s}
.toast.show{opacity:1}
.empty{text-align:center;padding:50px;color:#aaa}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div id="loginPage">
<div class="login-box">
  <div class="login-logo">艺风粤播</div>
  <div class="login-sub">课时管理系统</div>
  <div class="fi"><label>账号</label><input type="text" id="lu" placeholder="请输入账号"></div>
  <div class="fi"><label>密码</label><input type="password" id="lp" placeholder="请输入密码"></div>
  <button class="login-btn" onclick="doLogin()">登 录</button>
  <div class="login-err" id="loginErr"></div>
</div>
</div>

<div id="appPage" class="hidden">
  <div class="topbar">
    <div class="tbl"><span>艺风粤播</span></div>
    <div class="tbr"><span id="curRole"></span><button class="out-btn" onclick="doLogout()">退出</button></div>
  </div>
  
  <div id="adminTabs" class="tab-bar hidden">
    <div class="tab active" onclick="showPage('dashboard',this)">📊 总览</div>
    <div class="tab" onclick="showPage('students',this)">👨‍🎓 学员</div>
    <div class="tab" onclick="showPage('teachers',this)">👩‍🏫 教师</div>
  </div>

  <div class="page active" id="page-dashboard">
    <div class="stats-row">
      <div class="sc"><div class="sn" id="st-stu">0</div><div class="sl">学员</div></div>
      <div class="sc"><div class="sn" id="st-tea">0</div><div class="sl">教师</div></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-g" onclick="openModal('modal-student')">➕ 新增学员</button>
      <button class="btn btn-b" onclick="openModal('modal-teacher')">➕ 新增教师</button>
    </div>
    <div id="list-area"></div>
  </div>

  <div class="page" id="page-students">
    <div id="students-list"></div>
  </div>

  <div class="page" id="page-teachers">
    <div id="teachers-list"></div>
  </div>
</div>

<div class="overlay hidden" id="modal-student" onclick="if(event.target.id=='modal-student')closeModal('modal-student')">
<div class="sheet" onclick="event.stopPropagation()">
  <div class="sh" onclick="closeModal('modal-student')"></div>
  <div class="sheet-title">👨‍🎓 新增学员</div>
  <div class="form-group"><label>姓名</label><input class="si" id="inp-s-name" placeholder="请输入姓名"></div>
  <div class="form-group"><label>课程</label><input class="si" id="inp-s-course" placeholder="如：粤语播音"></div>
  <div class="form-group"><label>课时</label><input class="si" id="inp-s-hours" type="number" placeholder="10" min="1"></div>
  <button class="btn btn-g btn-block" onclick="saveStudent()">✅ 保存</button>
  <button class="btn btn-gray btn-block" onclick="closeModal('modal-student')">取消</button>
</div></div>

<div class="overlay hidden" id="modal-teacher" onclick="if(event.target.id=='modal-teacher')closeModal('modal-teacher')">
<div class="sheet" onclick="event.stopPropagation()">
  <div class="sh" onclick="closeModal('modal-teacher')"></div>
  <div class="sheet-title">👩‍🏫 新增教师</div>
  <div class="form-group"><label>姓名</label><input class="si" id="inp-t-name" placeholder="如：王老师"></div>
  <div class="form-group"><label>密码</label><input class="si" id="inp-t-pass" type="password" placeholder="登录密码"></div>
  <button class="btn btn-b btn-block" onclick="saveTeacher()">✅ 保存</button>
  <button class="btn btn-gray btn-block" onclick="closeModal('modal-teacher')">取消</button>
</div></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
// Firebase 配置
const firebaseConfig = {
  apiKey: "AIzaSyCEOvFWXytCOTHvgYhVkz226M0dQNfi3S0",
  authDomain: "crmyf-e776e.firebaseapp.com",
  databaseURL: "https://crmyf-e776e-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "crmyf-e776e",
  storageBucket: "crmyf-e776e.firebasestorage.app",
  messagingSenderId: "555471447094",
  appId: "1:555471447094:web:2edb02f2dc1a993bfae497"
};

// 初始化 Firebase
let db;
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  console.log('Firebase initialized successfully');
} catch(e) {
  console.error('Firebase init error:', e);
  alert('Firebase 初始化失败: ' + e.message);
}

let currentUser = null;

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function openModal(id) {
  document.getElementById(id).classList.remove('hidden');
}

function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
}

// 登录
function doLogin() {
  console.log('doLogin called');
  const u = document.getElementById('lu').value.trim();
  const p = document.getElementById('lp').value;
  const err = document.getElementById('loginErr');
  err.textContent = '';
  
  if (!u || !p) { err.textContent = '请输入账号和密码'; return; }
  
  toast('登录中...');
  
  if (!db) {
    err.textContent = '数据库未连接，请刷新页面';
    return;
  }
  
  console.log('Fetching accounts from Firebase...');
  db.ref('accounts').once('value')
    .then(snapshot => {
      console.log('Accounts loaded:', snapshot.val());
      const accounts = snapshot.val() || {};
      let found = null;
      Object.values(accounts).forEach(a => {
        if (a.username === u && a.password === p) found = a;
      });
      
      if (!found) { 
        err.textContent = '账号或密码错误'; 
        return; 
      }
      
      currentUser = found;
      sessionStorage.setItem('crm_user', JSON.stringify(found));
      showApp();
    })
    .catch(e => {
      err.textContent = '登录失败：' + e.message;
      console.error('Login error:', e);
    });
}

function doLogout() {
  currentUser = null;
  sessionStorage.removeItem('crm_user');
  document.getElementById('appPage').classList.add('hidden');
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('lu').value = '';
  document.getElementById('lp').value = '';
}

function showApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appPage').classList.remove('hidden');
  document.getElementById('adminTabs').classList.remove('hidden');
  document.getElementById('curRole').textContent = '👑 ' + currentUser.name;
  showPage('dashboard', document.querySelector('.tab'));
}

function showPage(page, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('page-' + page).classList.add('active');
  
  if (page === 'dashboard') loadDashboard();
  if (page === 'students') loadStudents();
  if (page === 'teachers') loadTeachers();
}

function loadDashboard() {
  if (!db) return;
  db.ref('students').once('value').then(s => {
    const count = s.val() ? Object.keys(s.val()).length : 0;
    document.getElementById('st-stu').textContent = count;
  });
  db.ref('teachers').once('value').then(s => {
    const count = s.val() ? Object.keys(s.val()).length : 0;
    document.getElementById('st-tea').textContent = count;
  });
}

function loadStudents() {
  if (!db) return;
  db.ref('students').once('value').then(snapshot => {
    const list = document.getElementById('students-list');
    const students = snapshot.val() || {};
    const arr = Object.values(students);
    if (arr.length === 0) {
      list.innerHTML = '<div class="empty">暂无学员</div>';
      return;
    }
    list.innerHTML = arr.map(s => '<div class="card"><div class="card-row"><span class="card-name">' + s.name + '</span><span>' + (s.course || '') + ' ' + (s.hours || 0) + '课时</span></div></div>').join('');
  });
}

function loadTeachers() {
  if (!db) return;
  db.ref('teachers').once('value').then(snapshot => {
    const list = document.getElementById('teachers-list');
    const teachers = snapshot.val() || {};
    const arr = Object.values(teachers);
    if (arr.length === 0) {
      list.innerHTML = '<div class="empty">暂无教师</div>';
      return;
    }
    list.innerHTML = arr.map(t => '<div class="card"><div class="card-row"><span class="card-name">' + t.name + '</span></div></div>').join('');
  });
}

// 保存学员
function saveStudent() {
  const name = document.getElementById('inp-s-name').value.trim();
  const course = document.getElementById('inp-s-course').value.trim();
  const hours = parseInt(document.getElementById('inp-s-hours').value) || 0;
  
  if (!name) { toast('请输入姓名'); return; }
  if (!course) { toast('请输入课程'); return; }
  if (hours < 1) { toast('请输入课时'); return; }
  
  toast('保存中...');
  
  const id = Date.now().toString();
  const student = { id, name, course, hours, remaining: hours, createdAt: new Date().toISOString() };
  const account = { id, username: name, password: '123456', name, role: 'student' };
  
  Promise.all([
    db.ref('students/' + id).set(student),
    db.ref('accounts/' + id).set(account)
  ]).then(() => {
    closeModal('modal-student');
    loadDashboard();
    toast('✅ 已添加学员：' + name);
    document.getElementById('inp-s-name').value = '';
    document.getElementById('inp-s-course').value = '';
    document.getElementById('inp-s-hours').value = '';
  }).catch(e => {
    toast('保存失败：' + e.message);
    console.error(e);
  });
}

// 保存教师
function saveTeacher() {
  const name = document.getElementById('inp-t-name').value.trim();
  const password = document.getElementById('inp-t-pass').value;
  
  if (!name) { toast('请输入姓名'); return; }
  if (!password) { toast('请输入密码'); return; }
  
  toast('保存中...');
  
  const id = Date.now().toString();
  const teacher = { id, name, createdAt: new Date().toISOString() };
  const account = { id, username: name, password, name, role: 'teacher' };
  
  Promise.all([
    db.ref('teachers/' + id).set(teacher),
    db.ref('accounts/' + id).set(account)
  ]).then(() => {
    closeModal('modal-teacher');
    loadDashboard();
    toast('✅ 已添加教师：' + name);
    document.getElementById('inp-t-name').value = '';
    document.getElementById('inp-t-pass').value = '';
  }).catch(e => {
    toast('保存失败：' + e.message);
    console.error(e);
  });
}

// 初始化管理员
function initAdmin() {
  if (!db) return;
  db.ref('accounts/admin').once('value').then(s => {
    if (!s.val()) {
      db.ref('accounts/admin').set({
        id: 'admin',
        username: 'admin',
        password: 'admin123',
        name: '管理员',
        role: 'admin'
      });
    }
  });
}

// 页面加载时
window.onload = function() {
  console.log('Page loaded');
  initAdmin();
  const saved = sessionStorage.getItem('crm_user');
  if (saved) {
    currentUser = JSON.parse(saved);
    showApp();
  }
};
</script>
</body>
</html>
