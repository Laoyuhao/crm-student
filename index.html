<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>艺风粤播 · 课时管理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif}
#loginPage{min-height:100vh;background:linear-gradient(135deg,#0d4a2a,#1a7a4a,#25a865);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
#loginPage::before{content:'';position:absolute;inset:0;background:url('LOGO.jpg') center/cover no-repeat fixed;opacity:0.12}
.lg{position:relative;z-index:1;text-align:center;max-width:360px;width:100%}
.lg-img{width:70px;height:70px;border-radius:18px;object-fit:cover;box-shadow:0 8px 32px rgba(0,0,0,.3);margin-bottom:10px;background:rgba(255,255,255,.2)}
.lg-title{font-size:32px;font-weight:800;color:#fff;letter-spacing:4px;text-shadow:0 2px 16px rgba(0,0,0,.3)}
.lg-slogan{font-size:12px;color:rgba(255,255,255,.6);letter-spacing:4px;margin-bottom:36px}
.lg-box{background:rgba(255,255,255,.12);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.18);border-radius:24px;padding:28px 22px;width:100%}
.f{margin-bottom:12px}
.f label{display:block;font-size:12px;color:rgba(255,255,255,.5);margin-bottom:5px;text-align:left}
.f input{width:100%;padding:13px 14px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:12px;font-size:16px;color:#fff;outline:none}
.f input::placeholder{color:rgba(255,255,255,.35)}
.f input:focus{border-color:#fff;background:rgba(255,255,255,.18)}
.lg-btn{width:100%;padding:14px;background:linear-gradient(135deg,#fff,#e8f5e9);color:#1a7a4a;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:6px}
.lg-btn:disabled{opacity:0.6;cursor:not-allowed}
.lg-err{color:#ffcdd2;font-size:13px;text-align:center;margin-top:10px}
.lg-loading{color:rgba(255,255,255,.7);font-size:13px;text-align:center;margin-top:8px}
#appPage{display:none}
#appPage.show{display:block}
.topbar{background:linear-gradient(135deg,#1a7a4a,#25a865);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tl{display:flex;align-items:center;gap:10px}
.tl-img{width:28px;height:28px;border-radius:6px;object-fit:cover;background:rgba(255,255,255,.2)}
.tl-title{font-size:16px;font-weight:700}
.tr{display:flex;align-items:center;gap:10px}
.sync-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.2)}
.tab-bar{display:flex;background:#fff;border-bottom:2px solid #eee;position:sticky;top:52px;z-index:99}
.tab{flex:1;padding:12px 4px;text-align:center;font-size:13px;font-weight:600;color:#999;cursor:pointer;border-bottom:3px solid transparent}
.tab.active{color:#1a7a4a;border-bottom-color:#1a7a4a}
.page{padding:14px;padding-bottom:30px}
.page.active{display:block}
.btn{padding:8px 14px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.btn-g{background:linear-gradient(135deg,#1a7a4a,#25a865);color:#fff}
.btn-b{background:linear-gradient(135deg,#2980b9,#3498db);color:#fff}
.btn-o{background:linear-gradient(135deg,#e67e22,#f39c12);color:#fff}
.btn-r{background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff}
.btn-gray{background:#eee;color:#666}
.btn-block{width:100%;justify-content:center}
.btn-sm{padding:6px 10px;font-size:12px}
.btn-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.sc{background:#fff;border-radius:14px;padding:12px 6px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.sn{font-size:24px;font-weight:800;color:#1a7a4a}
.sl{font-size:11px;color:#999;margin-top:2px}
.card{background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 6px rgba(0,0,0,.05);margin-bottom:10px}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cn{font-size:16px;font-weight:700}
.ci{font-size:13px;color:#666;margin-bottom:8px}
.ca{display:flex;gap:6px;flex-wrap:wrap}
.assign-list{margin-top:8px;border-top:1px solid #eee;padding-top:8px}
.assign-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#f5f7fa;border-radius:8px;margin-bottom:5px}
.assign-t{font-size:13px}
.assign-n{font-weight:600}
.assign-h{font-size:18px;font-weight:700;color:#1a7a4a}
.assign-r{font-size:11px;color:#888}
.lesson-item{padding:12px;background:#f5f7fa;border-radius:10px;margin-bottom:8px}
.lesson-d{font-size:11px;color:#888;margin-bottom:4px}
.lesson-h{font-size:12px;color:#1a7a4a;font-weight:600;margin-bottom:2px}
.lesson-f{font-size:13px;color:#444;background:#fff;padding:8px;border-radius:6px;margin-top:6px}
.tag{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600}
.tag-g{background:#d4edda;color:#155724}
.tag-b{background:#cce5ff;color:#004085}
.tag-o{background:#fff3cd;color:#856404}
.tag-r{background:#f8d7da;color:#721c24}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:20px}
.sh{width:36px;height:4px;background:#ccc;border-radius:2px;margin:0 auto 16px}
.st{font-size:18px;font-weight:700;margin-bottom:16px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.fi{width:100%;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:15px;outline:none;background:#fff}
.fi:focus{border-color:#25a865}
.ta{width:100%;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none;resize:none;min-height:80px}
.toast{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:12px 24px;border-radius:20px;font-size:14px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.empty{text-align:center;padding:40px;color:#ccc}
.empty-icon{font-size:40px;margin-bottom:8px}
.empty-text{font-size:14px}
.sync-box{background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 6px rgba(0,0,0,.05);margin-top:6px}
.sync-box h3{font-size:14px;margin-bottom:8px}
.sync-box p{font-size:12px;color:#888;margin-bottom:10px}
.hidden{display:none!important}
.out-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:4px 12px;border-radius:16px;font-size:12px;cursor:pointer}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div id="loginPage">
  <div class="lg">
    <img class="lg-img" src="LOGO.jpg" alt="logo">
    <div class="lg-title">艺风粤播</div>
    <div class="lg-slogan">· 课时管理系统 ·</div>
    <div class="lg-box">
      <div class="f"><label>账 号</label><input type="text" id="lu" placeholder="请输入账号" value="admin"></div>
      <div class="f"><label>密 码</label><input type="password" id="lp" placeholder="请输入密码" value="admin123"></div>
      <button class="lg-btn" id="loginBtn" onclick="login()">登 录</button>
      <div class="lg-err" id="loginErr"></div>
      <div class="lg-loading" id="loginLoading"></div>
    </div>
  </div>
</div>

<div id="appPage">
  <div class="topbar">
    <div class="tl">
      <img class="tl-img" src="LOGO.jpg" alt="logo">
      <span class="tl-title">艺风粤播</span>
    </div>
    <div class="tr">
      <span class="sync-badge" id="syncBadge">☁️</span>
      <span id="curRole"></span>
      <button class="out-btn" onclick="logout()">退出</button>
    </div>
  </div>
  
  <!-- 管理员标签 -->
  <div id="adminTabs" class="tab-bar hidden">
    <div class="tab active" onclick="switchTab('dashboard',this)">总览</div>
    <div class="tab" onclick="switchTab('students',this)">学员课时</div>
    <div class="tab" onclick="switchTab('teachers',this)">教师管理</div>
    <div class="tab" onclick="switchTab('accounts',this)">账号管理</div>
  </div>
  
  <!-- 教师标签 -->
  <div id="teacherTabs" class="tab-bar hidden">
    <div class="tab active" onclick="switchTab('myStudents',this)">我的学员</div>
    <div class="tab" onclick="switchTab('myLessons',this)">上课记录</div>
  </div>
  
  <!-- 学生标签 -->
  <div id="studentTabs" class="tab-bar hidden">
    <div class="tab active" onclick="switchTab('myInfo',this)">我的课时</div>
    <div class="tab" onclick="switchTab('myRecords',this)">上课记录</div>
  </div>

  <!-- ===== 管理员：总览 ===== -->
  <div class="page active" id="page-dashboard">
    <div class="stats">
      <div class="sc"><div class="sn" id="s-stu">0</div><div class="sl">学员</div></div>
      <div class="sc"><div class="sn" id="s-tea">0</div><div class="sl">教师</div></div>
      <div class="sc"><div class="sn" id="s-total">0</div><div class="sl">总课时</div></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-g" onclick="openNewStudent()">+ 新增学员</button>
      <button class="btn btn-b" onclick="openNewTeacher()">+ 新增教师</button>
    </div>
    <div class="sync-box">
      <h3>☁️ 云端同步</h3>
      <p>所有数据自动同步，多设备共享</p>
      <button class="btn btn-gray btn-block" onclick="forceSync()">🔄 刷新数据</button>
    </div>
  </div>

  <!-- ===== 管理员：学员课时管理 ===== -->
  <div class="page" id="page-students">
    <div class="btn-row"><button class="btn btn-g" onclick="openNewStudent()">+ 新增学员</button></div>
    <div id="students-list"></div>
  </div>

  <!-- ===== 管理员：教师管理 ===== -->
  <div class="page" id="page-teachers">
    <div class="btn-row"><button class="btn btn-b" onclick="openNewTeacher()">+ 新增教师</button></div>
    <div id="teachers-list"></div>
  </div>

  <!-- ===== 管理员：账号管理 ===== -->
  <div class="page" id="page-accounts">
    <div id="accounts-list"></div>
  </div>

  <!-- ===== 教师：我的学员 ===== -->
  <div class="page" id="page-myStudents">
    <div id="teacher-students"></div>
  </div>

  <!-- ===== 教师：上课记录 ===== -->
  <div class="page" id="page-myLessons">
    <div id="teacher-lessons"></div>
  </div>

  <!-- ===== 学生：我的课时 ===== -->
  <div class="page" id="page-myInfo">
    <div id="student-info"></div>
  </div>

  <!-- ===== 学生：上课记录 ===== -->
  <div class="page" id="page-myRecords">
    <div id="student-records"></div>
  </div>
</div>

<!-- ===== 弹窗 ===== -->

<!-- 新增/编辑学员 -->
<div class="overlay hidden" id="modal-student">
  <div class="sheet">
    <div class="sh"></div>
    <div class="st" id="modal-student-title">新增学员</div>
    <input type="hidden" id="m-s-id">
    <div class="fg"><label>姓名</label><input class="fi" id="m-s-name" placeholder="学员姓名"></div>
    <div class="fg"><label>登录密码</label><input class="fi" id="m-s-pass" type="password" placeholder="留空默认123456"></div>
    <button class="btn btn-g btn-block" onclick="saveStudent()">保存</button>
    <button class="btn btn-r btn-block" style="margin-top:8px" id="btn-del-student" onclick="deleteStudent()">删除学员</button>
    <button class="btn btn-gray btn-block" style="margin-top:8px" onclick="hideModal('modal-student')">取消</button>
  </div>
</div>

<!-- 新增/编辑教师 -->
<div class="overlay hidden" id="modal-teacher">
  <div class="sheet">
    <div class="sh"></div>
    <div class="st" id="modal-teacher-title">新增教师</div>
    <input type="hidden" id="m-t-id">
    <div class="fg"><label>姓名</label><input class="fi" id="m-t-name" placeholder="教师姓名"></div>
    <div class="fg"><label>登录密码</label><input class="fi" id="m-t-pass" type="password" placeholder="登录密码"></div>
    <button class="btn btn-b btn-block" onclick="saveTeacher()">保存</button>
    <button class="btn btn-r btn-block" style="margin-top:8px" id="btn-del-teacher" onclick="deleteTeacher()">删除教师</button>
    <button class="btn btn-gray btn-block" style="margin-top:8px" onclick="hideModal('modal-teacher')">取消</button>
  </div>
</div>

<!-- 分配课时 -->
<div class="overlay hidden" id="modal-assign">
  <div class="sheet">
    <div class="sh"></div>
    <div class="st">分配课时给教师</div>
    <input type="hidden" id="m-a-sid">
    <div class="fg"><label>学员</label><div id="m-a-sname" style="padding:10px;background:#f5f5f5;border-radius:8px;font-weight:600"></div></div>
    <div class="fg"><label>选择教师</label><select class="fi" id="m-a-teacher"></select></div>
    <div class="fg"><label>分配课时数</label><input class="fi" id="m-a-hours" type="number" placeholder="输入课时数" min="1"></div>
    <button class="btn btn-g btn-block" onclick="saveAssign()">确认分配</button>
    <button class="btn btn-gray btn-block" style="margin-top:8px" onclick="hideModal('modal-assign')">取消</button>
  </div>
</div>

<!-- 教师销课 -->
<div class="overlay hidden" id="modal-lesson">
  <div class="sheet">
    <div class="sh"></div>
    <div class="st">记录上课</div>
    <input type="hidden" id="m-l-sid">
    <input type="hidden" id="m-l-aidx">
    <div class="fg" style="background:#e8f5e9;padding:12px;border-radius:10px;margin-bottom:14px">
      <div id="m-l-sname" style="font-weight:700;font-size:16px"></div>
      <div id="m-l-rem" style="font-size:13px;color:#666;margin-top:4px"></div>
    </div>
    <div class="fg"><label>销课数量</label><input class="fi" id="m-l-hours" type="number" placeholder="1" min="1" value="1"></div>
    <div class="fg"><label>上课时间</label><input class="fi" id="m-l-date" type="datetime-local"></div>
    <div class="fg"><label>课堂反馈</label><textarea class="ta" id="m-l-fb" placeholder="记录本节课内容、学员表现、作业等..."></textarea></div>
    <button class="btn btn-g btn-block" onclick="saveLesson()">确认销课</button>
    <button class="btn btn-gray btn-block" style="margin-top:8px" onclick="hideModal('modal-lesson')">取消</button>
  </div>
</div>

<script>
// Supabase配置
var SUPABASE_URL = 'https://uwmujdjedxrksnpgbfmo.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3bXVqZGplZHhya3NucGdiZm1vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MDYwODQsImV4cCI6MjA5MDE4MjA4NH0.T3va7qhKUm7AVbHMFGDwF2QeN_x2ENabAVhqo226amc';
var TABLE = 'app_state';

var DB = null;
var currentUser = null;
var isLoading = false;

// 云端操作
async function fetchCloud() {
  try {
    var res = await fetch(SUPABASE_URL + '/rest/v1/' + TABLE + '?id=eq.main&select=data', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    if (res.ok) {
      var d = await res.json();
      if (d && d.length > 0) return d[0].data;
    }
  } catch(e) { console.log('云端加载失败', e); }
  return null;
}

async function saveCloud(data) {
  try {
    await fetch(SUPABASE_URL + '/rest/v1/' + TABLE + '?id=eq.main', {
      method: 'PATCH',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ data: data, updated_at: new Date().toISOString() })
    });
    updateBadge('✓');
  } catch(e) { console.log('云端保存失败', e); }
}

function initDB(cloud) {
  if (cloud) { DB = cloud; updateBadge('✓'); }
  else {
    DB = {
      students: {},       // {id: {id, name, totalHours, assignments:[{teacherId, hours, remaining}]}}
      teachers: {},       // {id: {id, name}}
      accounts: {'admin':{id:'admin',username:'admin',password:'admin123',name:'管理员',role:'admin'}},
      lessons: []         // [{id, studentId, teacherId, hours, lessonDate, feedback}]
    };
  }
}

function updateBadge(t) { var b = document.getElementById('syncBadge'); if(b) b.textContent = t; }

// UI工具
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');}, 2000);
}
function showModal(id) { document.getElementById(id).classList.remove('hidden'); }
function hideModal(id) { document.getElementById(id).classList.add('hidden'); }
function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
function dt(ds) {
  if (!ds) return '';
  var d = new Date(ds);
  var p = function(n){return n<10?'0'+n:n;};
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes());
}

// 登录
function login() {
  if (isLoading) return;
  var u = document.getElementById('lu').value.trim();
  var p = document.getElementById('lp').value;
  var err = document.getElementById('loginErr');
  var loading = document.getElementById('loginLoading');
  var btn = document.getElementById('loginBtn');
  err.textContent = '';
  loading.textContent = '正在连接云端...';
  btn.disabled = true;
  isLoading = true;

  (async function() {
    var cloud = await fetchCloud();
    initDB(cloud);
    
    var found = null;
    for (var k in DB.accounts) {
      if (DB.accounts[k].username === u && DB.accounts[k].password === p) { found = DB.accounts[k]; break; }
    }
    if (!found) { err.textContent = '账号或密码错误'; loading.textContent = ''; btn.disabled = false; isLoading = false; return; }
    currentUser = found;
    sessionStorage.setItem('crm_user', JSON.stringify(found));
    showApp();
    btn.disabled = false;
    isLoading = false;
    loading.textContent = '';
  })();
}

function logout() {
  currentUser = null;
  sessionStorage.removeItem('crm_user');
  document.getElementById('appPage').classList.remove('show');
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('lu').value = 'admin';
  document.getElementById('lp').value = '';
}

function showApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appPage').classList.add('show');
  document.getElementById('adminTabs').classList.add('hidden');
  document.getElementById('teacherTabs').classList.add('hidden');
  document.getElementById('studentTabs').classList.add('hidden');
  
  if (currentUser.role === 'admin') {
    document.getElementById('adminTabs').classList.remove('hidden');
    document.getElementById('curRole').textContent = '👑 管理员';
    switchTab('dashboard', document.getElementById('adminTabs').querySelector('.tab'));
  } else if (currentUser.role === 'teacher') {
    document.getElementById('teacherTabs').classList.remove('hidden');
    document.getElementById('curRole').textContent = '👩‍🏫 ' + currentUser.name;
    switchTab('myStudents', document.getElementById('teacherTabs').querySelector('.tab'));
  } else if (currentUser.role === 'student') {
    document.getElementById('studentTabs').classList.remove('hidden');
    document.getElementById('curRole').textContent = '👨‍🎓 ' + currentUser.name;
    switchTab('myInfo', document.getElementById('studentTabs').querySelector('.tab'));
  }
}

function switchTab(page, el) {
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  if (el) el.classList.add('active');
  var pEl = document.getElementById('page-' + page);
  if (pEl) pEl.classList.add('active');
  
  switch(page) {
    case 'dashboard': renderDash(); break;
    case 'students': renderStudents(); break;
    case 'teachers': renderTeachers(); break;
    case 'accounts': renderAccounts(); break;
    case 'myStudents': renderMyStudents(); break;
    case 'myLessons': renderMyLessons(); break;
    case 'myInfo': renderMyInfo(); break;
    case 'myRecords': renderMyRecords(); break;
  }
}

// ===== 管理员：总览 =====
function renderDash() {
  var stuCount = Object.keys(DB.students).length;
  var teaCount = Object.keys(DB.teachers).length;
  var totalHours = 0;
  for (var sid in DB.students) {
    var s = DB.students[sid];
    if (s.assignments) s.assignments.forEach(function(a){ totalHours += (a.remaining || 0); });
  }
  document.getElementById('s-stu').textContent = stuCount;
  document.getElementById('s-tea').textContent = teaCount;

// ===== 管理员：学员课时管理 =====
function renderStudents() {
  var el = document.getElementById('students-list');
  var list = Object.values(DB.students);
  if (!list.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">👨‍🎓</div><div class="empty-text">暂无学员</div></div>'; return; }
  
  el.innerHTML = list.map(function(s) {
    var assigns = s.assignments || [];
    var totalRem = assigns.reduce(function(a,x){return a+(x.remaining||0);},0);

    var assignHtml = assigns.length ? assigns.map(function(a, i) {
      var t = DB.teachers[a.teacherId];
      return '<div class="assign-item">' +

// ===== 分配课时 =====
function openAssign(sid) {
  var s = DB.students[sid];
  document.getElementById('m-a-sid').value = sid;
  document.getElementById('m-a-sname').textContent = s.name;
  document.getElementById('m-a-hours').value = '';
  
  var sel = document.getElementById('m-a-teacher');
  var html = '<option value="">选择教师</option>';
  for (var tid in DB.teachers) {
    html += '<option value="' + tid + '">' + esc(DB.teachers[tid].name) + '</option>';
  }
  sel.innerHTML = html;
  
  showModal('modal-assign');
}

async function saveAssign() {
  var sid = document.getElementById('m-a-sid').value;
  var tid = document.getElementById('m-a-teacher').value;
  var hours = parseInt(document.getElementById('m-a-hours').value) || 0;
  
  if (!tid) { toast('请选择教师'); return; }
  if (hours < 1) { toast('请输入课时数'); return; }
  
  var s = DB.students[sid];
  if (!s.assignments) s.assignments = [];
  
  // 检查是否已分配给该教师
  var found = s.assignments.find(function(a){ return a.teacherId === tid; });
  if (found) {
    found.hours += hours;
    found.remaining += hours;
  } else {
    s.assignments.push({ teacherId: tid, hours: hours, remaining: hours });
  }
  
  await saveCloud(DB);
  hideModal('modal-assign');
  toast('已分配 ' + hours + ' 课时');
  renderStudents();
  renderDash();
}

function openNewStudent() {

  document.getElementById('m-s-id').value = '';
  document.getElementById('m-s-name').value = '';
  document.getElementById('m-s-pass').value = '';
  document.getElementById('btn-del-student').style.display = 'none';
  showModal('modal-student');
}

function editStudent(sid) {
  var s = DB.students[sid];
  var acc = DB.accounts[sid];
  document.getElementById('modal-student-title').textContent = '编辑学员';
  document.getElementById('m-s-id').value = sid;

}

async function saveStudent() {
  var id = document.getElementById('m-s-id').value;
  var name = document.getElementById('m-s-name').value.trim();
  var pass = document.getElementById('m-s-pass').value;
  
  if (!name) { toast('请输入姓名'); return; }
  
  if (id) {
    // 编辑
    DB.students[id].name = name;
    if (pass) {
      DB.accounts[id].password = pass;
      DB.accounts[id].username = name;
      DB.accounts[id].name = name;
    }
    toast('已更新学员');
  } else {
    // 新增
    id = 's' + Date.now();
    DB.students[id] = { id: id, name: name, assignments: [] };
    DB.accounts[id] = { id: id, username: name, password: pass || '123456', name: name, role: 'student' };
    toast('已添加学员：' + name);
  }
  
  await saveCloud(DB);
  hideModal('modal-student');
  document.getElementById('m-s-name').value = '';
  document.getElementById('m-s-pass').value = '';
  renderStudents();
  renderDash();
}

async function deleteStudent() {
  var id = document.getElementById('m-s-id').value;
  if (!id) return;
  
  // 检查是否有剩余课时
  var s = DB.students[id];
  var hasRem = s.assignments && s.assignments.some(function(a){ return a.remaining > 0; });
  if (hasRem) {
    if (!confirm('该学员还有剩余课时，确定删除？')) return;
  } else {
    if (!confirm('确定删除该学员？此操作不可恢复')) return;
  }
  
  delete DB.students[id];
  delete DB.accounts[id];
  // 删除相关上课记录
  DB.lessons = DB.lessons.filter(function(l){ return l.studentId !== id; });
  
  await saveCloud(DB);
  hideModal('modal-student');
  toast('已删除学员');
  renderStudents();
  renderDash();
}

  var hasStu = false;
  for (var sid in DB.students) {

      }

      if (DB.students[sid].assignments) {
        DB.students[sid].assignments = DB.students[sid].assignments.filter(function(a){ return a.teacherId !== id; });

  } else {

  delete DB.teachers[id];
  delete DB.accounts[id];
  // 删除相关上课记录

// ===== 教师端：销课弹窗 =====
function openLesson(sid, aidx) {
  var s = DB.students[sid];
  var a = s.assignments[aidx];
  
  document.getElementById('m-l-sid').value = sid;
  document.getElementById('m-l-aidx').value = aidx;
  document.getElementById('m-l-sname').textContent = s.name;
  document.getElementById('m-l-rem').textContent = '剩余 ' + a.remaining + ' 课时';
  document.getElementById('m-l-hours').value = 1;
  document.getElementById('m-l-hours').max = a.remaining;
  
  var now = new Date();
  var p = function(n){return n<10?'0'+n:n;};
  document.getElementById('m-l-date').value = now.getFullYear()+'-'+p(now.getMonth()+1)+'-'+p(now.getDate())+'T'+p(now.getHours())+':'+p(now.getMinutes());
  document.getElementById('m-l-fb').value = '';
  
  showModal('modal-lesson');
}

async function saveLesson() {
  var sid = document.getElementById('m-l-sid').value;
  var aidx = parseInt(document.getElementById('m-l-aidx').value);
  var hours = parseInt(document.getElementById('m-l-hours').value) || 1;
  var date = document.getElementById('m-l-date').value;
  var fb = document.getElementById('m-l-fb').value.trim();
  
  if (hours < 1) { toast('请输入销课数量'); return; }
  if (!date) { toast('请选择上课时间'); return; }
  if (!fb) { toast('请填写课堂反馈'); return; }
  
  var a = DB.students[sid].assignments[aidx];
  if (hours > a.remaining) { toast('销课数量超过剩余课时'); return; }
  
  a.remaining -= hours;
  
  DB.lessons.push({
    id: 'l' + Date.now(),
    studentId: sid,
    teacherId: currentUser.id,
    hours: hours,
    lessonDate: date,
    feedback: fb,
    createdAt: new Date().toISOString()
  });
  
  await saveCloud(DB);
  hideModal('modal-lesson');
  toast('已销 ' + hours + ' 课时，剩余 ' + a.remaining + ' 课时');
  renderMyStudents();
  renderMyLessons();
}
