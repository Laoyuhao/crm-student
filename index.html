<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>艺风粤播 · 课时管理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;background:#f5f6fa;color:#222}
#loginPage{min-height:100vh;background:linear-gradient(135deg,#1a7a4a,#25a865);display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:#fff;border-radius:24px;padding:36px 28px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.login-logo{text-align:center;margin-bottom:14px}
.login-logo img{max-width:200px;max-height:70px;object-fit:contain}
.login-sub{text-align:center;font-size:13px;color:#aaa;margin-bottom:26px}
.fi{margin-bottom:13px}
.fi label{display:block;font-size:13px;color:#aaa;margin-bottom:5px;font-weight:500}
.fi input{width:100%;padding:13px 15px;border:2px solid #e0e0e0;border-radius:12px;font-size:16px;outline:none;background:#fff}
.fi input:focus{border-color:#25a865}
.login-btn{width:100%;padding:15px;background:linear-gradient(135deg,#1a7a4a,#25a865);color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;margin-top:6px}
.login-btn:disabled{opacity:.6;cursor:not-allowed}
.login-err{color:#e74c3c;font-size:13px;text-align:center;margin-top:8px}
.hint-box{margin-top:18px;padding:13px;background:#f0fdf6;border-radius:12px;font-size:13px;color:#1a7a4a;text-align:center;line-height:2}
.topbar{background:linear-gradient(135deg,#1a7a4a,#25a865);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(26,122,74,.4)}
.tbl{display:flex;align-items:center;gap:10px}
.tbl img{height:34px;object-fit:contain}
.tbl span{font-size:16px;font-weight:700}
.tbr{font-size:13px;display:flex;align-items:center;gap:8px}
.out-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:5px 12px;border-radius:20px;font-size:13px;cursor:pointer}
.tab-bar{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;position:sticky;top:58px;z-index:99;overflow-x:auto}
.tab{flex:1;min-width:60px;padding:13px 6px;text-align:center;font-size:13px;font-weight:600;color:#aaa;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.tab.active{color:#1a7a4a;border-bottom-color:#1a7a4a}
.page{display:none;padding:16px;padding-bottom:40px}
.page.active{display:block}
.btn{padding:11px 16px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:transform .1s}
.btn:active{transform:scale(.96)}
.btn-g{background:linear-gradient(135deg,#1a7a4a,#25a865);color:#fff}
.btn-b{background:linear-gradient(135deg,#2980b9,#3498db);color:#fff}
.btn-o{background:#e67e22;color:#fff}
.btn-r{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff}
.btn-gray{background:#f0f0f0;color:#666}
.btn-sm{padding:8px 12px;font-size:13px}
.btn-block{width:100%;justify-content:center}
.btn-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.section-title{font-size:16px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #d4f5e2}
.stats-row{display:flex;gap:10px;margin-bottom:16px}
.sc{flex:1;background:#fff;border-radius:14px;padding:14px 8px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.sn{font-size:26px;font-weight:700;color:#1a7a4a}
.sl{font-size:11px;color:#aaa;margin-top:2px}
.search-wrap{margin-bottom:14px}
.search-input{width:100%;padding:12px 15px;border:2px solid #e0e0e0;border-radius:12px;font-size:15px;outline:none;background:#fff}
.search-input:focus{border-color:#25a865}
.card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.05);margin-bottom:12px}
.card-row{display:flex;justify-content:space-between;align-items:center}
.card-name{font-size:17px;font-weight:700}
.card-sub{font-size:13px;color:#aaa}
.card-action{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;padding:20px;animation:su .25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 18px}
.sheet-title{font-size:20px;font-weight:700;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:#aaa;margin-bottom:5px;font-weight:500}
.si{width:100%;padding:13px 15px;border:2px solid #e0e0e0;border-radius:12px;font-size:16px;outline:none;font-family:inherit;margin-bottom:12px;background:#fff}
.si:focus{border-color:#25a865}
textarea.si{resize:vertical;min-height:100px}
select.si{appearance:auto}
.add-link{color:#1a7a4a;font-size:14px;cursor:pointer;display:inline-block;margin-bottom:12px}
.del-btn{width:34px;height:34px;border:none;background:#fdecea;color:#e74c3c;border-radius:8px;font-size:16px;cursor:pointer;flex-shrink:0}
.fb-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,.04)}
.fb-hd{display:flex;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:4px}
.fb-course{font-size:14px;font-weight:700;color:#1a7a4a}
.fb-meta{font-size:12px;color:#aaa}
.fb-teacher{font-size:13px;color:#2980b9;margin-bottom:6px}
.fb-text{font-size:14px;line-height:1.8;background:#fafafa;padding:10px;border-radius:8px;border-left:3px solid #25a865}
.mp{display:flex;gap:8px;align-items:center;margin-bottom:14px;background:#fff;padding:10px 14px;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.mp select{flex:1;padding:8px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;appearance:auto;background:#fff}
.mp label{font-size:13px;font-weight:600;white-space:nowrap}
.ds{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.ds-name{font-size:16px;font-weight:700;margin-bottom:10px}
.ds-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.ds-row input,.ds-row textarea{border:2px solid #e0e0e0;border-radius:8px;padding:10px;font-size:14px;outline:none;font-family:inherit;background:#fff;flex:1}
.ds-row input[type="number"]{flex:0 0 70px}
.ds-row textarea{min-height:60px;resize:vertical}
.ds-fb-label{font-size:13px;color:#aaa;margin-bottom:5px;display:block}
.tl-item{display:flex;gap:12px;padding-bottom:14px;position:relative}
.tl-item::before{content:'';position:absolute;left:11px;top:24px;bottom:0;width:2px;background:#e0e0e0}
.tl-dot{width:24px;height:24px;border-radius:50%;background:#1a7a4a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.tl-dot-r{background:#e74c3c}
.tl-content{flex:1;background:#fff;border-radius:12px;padding:12px;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.tc-hd{display:flex;justify-content:space-between;margin-bottom:6px}
.tc-course{font-size:14px;font-weight:700;color:#1a7a4a}
.tc-hours{font-size:14px;font-weight:700;color:#e74c3c}
.tc-info{font-size:12px;color:#2980b9;margin-bottom:4px}
.tc-fb{font-size:13px;color:#222;line-height:1.6;background:#fafafa;padding:8px;border-radius:6px;margin-top:6px}
.tc-date{font-size:12px;color:#aaa;margin-top:4px}
.sdh{background:linear-gradient(135deg,#1a7a4a,#25a865);color:#fff;border-radius:16px;padding:18px;margin-bottom:16px}
.sdh-name{font-size:22px;font-weight:700;margin-bottom:4px}
.sdh-meta{font-size:13px;opacity:.85}
.sdh-tags{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.sdh-tag{background:rgba(255,255,255,.2);padding:4px 10px;border-radius:20px;font-size:13px}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:12px 24px;border-radius:24px;font-size:15px;z-index:999;pointer-events:none;opacity:0;transition:opacity .2s}
.toast.show{opacity:1}
.empty{text-align:center;padding:50px 20px;color:#aaa;font-size:15px}
.hidden{display:none!important}
.info-box{background:#f0fdf6;border-radius:12px;padding:14px;font-size:13px;color:#555;line-height:1.8;margin-bottom:14px}
.badge-g{background:#f0fdf6;color:#1a7a4a;padding:2px 8px;border-radius:10px;font-size:12px}
.badge-b{background:#e8f0ff;color:#2980b9;padding:2px 8px;border-radius:10px;font-size:12px}
.badge-o{background:#fff3e0;color:#e67e22;padding:2px 8px;border-radius:10px;font-size:12px}
</style>
</head>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyCEOvFWXytCOTHvgYhVkz226M0dQNfi3S0",
  authDomain: "crmyf-e776e.firebaseapp.com",
  projectId: "crmyf-e776e",
  storageBucket: "crmyf-e776e.firebasestorage.app",
  messagingSenderId: "555471447094",
  appId: "1:555471447094:web:2edb02f2dc1a993bfae497"
});
const db=firebase.firestore();
let CU=null;
let allData={students:[],teachers:[],lessons:[],accounts:[],assignments:[]};
let _dbReady=false;

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

async function loadAllData(){
  try {
    _dbReady=false;
    const [s,t,l,a,g]=await Promise.all([
      db.collection('students').get(),
      db.collection('teachers').get(),
      db.collection('lessons').get(),
      db.collection('accounts').get(),
      db.collection('assignments').get()
    ]);
    allData.students=s.docs.map(d=>({_id:d.id,...d.data()}));
    allData.teachers=t.docs.map(d=>({_id:d.id,...d.data()}));
    allData.lessons=l.docs.map(d=>({_id:d.id,...d.data()}));
    allData.accounts=a.docs.map(d=>({_id:d.id,...d.data()}));
    allData.assignments=g.docs.map(d=>({_id:d.id,...d.data()}));
    _dbReady=true;
  } catch(e){console.error('加载数据失败',e);toast('数据加载失败，请检查网络');}
}

async function doLogin(){
  const btn=document.getElementById('loginBtn');
  btn.disabled=true;btn.textContent='登录中...';
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value;
  const e=document.getElementById('loginErr');
  e.textContent='';
  if(!u||!p){e.textContent='请输入账号和密码';btn.disabled=false;btn.textContent='登录';return}
  try {
    await loadAllData();
    if(!_dbReady){e.textContent='连接数据库失败，请检查网络';btn.disabled=false;btn.textContent='登录';return}
    const acc=allData.accounts.find(x=>x.username===u&&x.password===p);
    if(!acc){e.textContent='账号或密码错误';btn.disabled=false;btn.textContent='登录';return}
    CU=acc;
    sessionStorage.setItem('crm5',JSON.stringify(CU));
    btn.textContent='登录';btn.disabled=false;
    showApp();
  } catch(err){e.textContent='登录失败，请检查网络';btn.disabled=false;btn.textContent='登录';}
}

function doLogout(){
  CU=null;sessionStorage.removeItem('crm5');
  document.getElementById('appPage').classList.add('hidden');
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('lu').value='';document.getElementById('lp').value='';
}

async function showApp(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('appPage').classList.remove('hidden');

function initMp(id){
  const sel=document.getElementById(id);if(!sel)return;
  sel.innerHTML='';
  const now=new Date();
  for(let i=0;i<6;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const v=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const o=document.createElement('option');o.value=v;o.textContent=d.getFullYear()+'年'+(d.getMonth()+1)+'月';
    sel.appendChild(o);
  }
}

function fmt(iso){
  const d=new Date(iso);
  return(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

function fmtDate(iso){
  if(!iso)return'';
  const d=new Date(iso);
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}

function getMR(v){
  const [y,m]=v.split('-').map(Number);
  return{start:new Date(y,m-1,1),end:new Date(y,m,1)};
}

async function saveAssignment(){
  console.log('saveAssignment called');
  try{
    const sid=parseInt(document.getElementById('asgn-stu').value);
    const cName=document.getElementById('asgn-course').value;
    const tid=parseInt(document.getElementById('asgn-tea').value);
    const hours=parseInt(document.getElementById('asgn-hours').value)||0;
    if(hours<1){toast('请输入有效的分配课时数');return}
    const stu=allData.students.find(s=>s.studentId===sid);if(!stu)return;
    const c=stu.courses.find(x=>x.name===cName);if(!c)return;
    toast('保存中...');
    const asgn=allData.assignments;
    let assigned=0;
    asgn.forEach(a=>{if(a.studentId===sid&&a.courseName===cName)assigned+=a.hours||0;});
    if(assigned+hours>c.total){toast('分配课时超出课程总量（已分配'+assigned+'节，最多可再分'+(c.total-assigned)+'节）');return}
    const idx=asgn.findIndex(a=>a.studentId===sid&&a.courseName===cName&&a.teacherId===tid);
    const aid=Date.now();
    if(idx>=0){
      const a=asgn[idx];
      await db.collection('assignments').doc(a._id).update({hours:a.hours+hours});
    }else{
      await db.collection('assignments').doc(String(aid)).set({studentId:sid,courseName:cName,teacherId:tid,hours});
    }
    await loadAllData();
    closeAssign();renderAssignList();renderAd();
    toast('✅ 分配成功');
  }catch(e){console.error(e);toast('保存失败：'+e.message);}
}

      return'<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0"><span>'+ac.courseName+'</span><span style="color:#1a7a4a;font-weight:600">分配'+ac.hours+'节 · 剩余'+c.remaining+'节</span></div>';
    }).join('');
    return'<div class="card" onclick="openTsd('+sid+')" style="cursor:pointer"><div class="card-row"><div><span class="card-name">'+s.name+'</span></div><span style="color:#aaa">›</span></div>'+courseRows+'</div>';
  }).join(''):'<div class="empty">暂无分配的学生</div>';
}

function openTsd(studentId){
  const stu=allData.students.find(s=>s.studentId===studentId);if(!stu)return;
  const asgn=allData.assignments.filter(a=>a.studentId===studentId&&a.teacherId===CU.teacherId);
  const les=allData.lessons.filter(l=>l.studentId===studentId&&l.teacherId===CU.teacherId).reverse();
  const today=new Date().toISOString().split('T')[0];
  const sections=asgn.map(ac=>{
    const c=stu.courses.find(x=>x.name===ac.courseName);
    if(!c)return'';
    const ck=ac.courseName.replace(/\s/g,'_');
    const cl=les.filter(l=>l.courseName===ac.courseName);
    const hist=cl.map(l=>'<div style="padding:8px 0;border-bottom:1px solid #e0e0e0"><div style="display:flex;justify-content:space-between"><span style="font-size:13px;color:#e74c3c;font-weight:600">'+l.hours+'节</span><span style="font-size:12px;color:#aaa">'+fmtDate(l.lessonDate)+'</span></div>'+(l.feedback?'<div style="font-size:13px;color:#666;margin-top:4px;padding:6px;background:#fafafa;border-radius:6px">'+l.feedback+'</div>':'')+'</div>').join('');
    return'<div class="ds"><div class="ds-name">'+ac.courseName+' <span style="color:#1a7a4a;font-size:14px">分配'+ac.hours+'节 · 剩余'+c.remaining+'节</span></div><div class="ds-row"><label style="font-size:13px;color:#aaa">上课时间：</label><input type="date" id="td-date-'+ck+'" value="'+today+'"></div><div class="ds-row"><label style="font-size:13px;color:#aaa">销课节数：</label><input type="number" id="td-h-'+ck+'" value="1" min="1" max="'+Math.min(ac.hours,c.remaining)+'" style="flex:0 0 70px"><button class="btn btn-g" style="flex:1" onclick="doDeduct('+studentId+',\''+ac.courseName+'\')">销课</button></div><div class="ds-fb-label">课堂反馈（必填）</div><textarea id="td-fb-'+ck+'" placeholder="记录本次上课情况..."></textarea><div style="margin-top:8px">'+hist+'</div></div>';
  }).join('');
  document.getElementById('tsdC').innerHTML='<div class="sdh"><div class="sdh-name">'+stu.name+'</div><div class="sdh-meta">'+(stu.phone||'无联系方式')+'</div></div>'+sections+'<button class="btn btn-gray btn-block" onclick="closeTsd()" style="margin-top:8px">关闭</button>';
  document.getElementById('tsdOvl').classList.remove('hidden');
}
function closeTsd(){document.getElementById('tsdOvl').classList.add('hidden')}

async function doDeduct(studentId,courseName){
  const stu=allData.students.find(s=>s.studentId===studentId);if(!stu)return;
  const c=stu.courses.find(x=>x.name===courseName);if(!c)return;
  const cKey=courseName.replace(/\s/g,'_');
  const hours=parseInt(document.getElementById('td-h-'+cKey).value)||1;
  const lessonDate=document.getElementById('td-date-'+cKey).value;
  const feedback=document.getElementById('td-fb-'+cKey).value.trim();
  if(!lessonDate){toast('请选择上课时间');return}
  if(!feedback){toast('请填写课堂反馈');return}
  if(c.remaining<hours){toast('课时不足，仅剩 '+c.remaining+' 节');return}
  c.remaining-=hours;
  await db.collection('students').doc(String(studentId)).update({courses:stu.courses});
  const lid=Date.now();
  await db.collection('lessons').doc(String(lid)).set({lessonId:lid,studentId,courseName,hours,teacherId:CU.teacherId,teacherName:CU.name,lessonDate:new Date(lessonDate).toISOString(),feedback,createdAt:new Date().toISOString()});
  await loadAllData();
  toast('✅ 销课成功！');
  closeTsd();
  renderTd();renderTr();renderAd();
}

function renderTr(){
  if(!CU.teacherId)return;
  const val=document.getElementById('tr-m').value;if(!val)return;
  const {start,end}=getMR(val);
  const stu=allData.students;
  const les=allData.lessons.filter(l=>l.teacherId===CU.teacherId&&l.lessonDate&&new Date(l.lessonDate)>=start&&new Date(l.lessonDate)<end).reverse();
  document.getElementById('tr-list').innerHTML=les.length?les.map(l=>{
    const s=stu.find(x=>x.studentId===l.studentId);
    return'<div class="fb-card"><div class="fb-hd"><span class="fb-course">'+l.courseName+' · '+l.hours+'节</span><span class="fb-meta">'+fmtDate(l.lessonDate)+'</span></div><div class="fb-teacher">'+(s?s.name:'')+'</div>'+(l.feedback?'<div class="fb-text">'+l.feedback+'</div>':'')+'</div>';
  }).join(''):'<div class="empty">该月暂无记录</div>';
}

// STUDENT
function renderSo(){
  if(!CU.studentId)return;
  const stu=allData.students.find(s=>s.studentId===CU.studentId);if(!stu)return;
  const tea=allData.teachers,asgn=allData.assignments.filter(a=>a.studentId===CU.studentId);
  const courses=stu.courses||[];
  let remT=0,totT=0;courses.forEach(c=>{remT+=c.remaining;totT+=c.total});
  document.getElementById('so-rem').textContent=remT;
  document.getElementById('so-tot').textContent=totT;
  document.getElementById('so-courses').innerHTML=courses.map(c=>{
    const a=asgn.find(x=>x.courseName===c.name);
    const t=a?tea.find(x=>x.teacherId===a.teacherId):null;
    const pct=(c.remaining/c.total*100).toFixed(0);
    return'<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:16px;font-weight:700">'+c.name+'</span><span style="padding:4px 12px;border-radius:20px;font-size:13px;font-weight:600;background:'+(c.remaining>3?'#f0fdf6;color:#1a7a4a':c.remaining>0?'#fff3e0;color:#e67e22':'#fdecea;color:#e74c3c')+'">'+c.remaining+'/'+c.total+'节</span></div><div style="height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#1a7a4a,#25a865);border-radius:3px"></div></div><div style="font-size:13px;color:#aaa;margin-top:6px">'+(c.total-c.remaining)+'节已消耗 · 剩余'+c.remaining+'节'+(t?' · 👩‍🏫 '+t.name:'')+'</div></div>';
  }).join('');
}

function renderSh(){
  if(!CU.studentId)return;
  const les=allData.lessons.filter(l=>l.studentId===CU.studentId).reverse();
  document.getElementById('sh-list').innerHTML=les.length?les.map(l=>{
    const dot=l.feedback?'<div class="tl-dot">●</div>':'<div class="tl-dot tl-dot-r">●</div>';
    return'<div class="tl-item">'+dot+'<div class="tl-content"><div class="tc-hd"><span class="tc-course">'+l.courseName+'</span><span class="tc-hours">'+l.hours+'节</span></div><div class="tc-info">👩‍🏫 '+l.teacherName+' · '+fmtDate(l.lessonDate)+'</div>'+(l.feedback?'<div class="tc-fb">'+l.feedback+'</div>':'')+'</div></div>';
  }).join(''):'<div class="empty">暂无课时记录</div>';
}

// Seed data
async function seedData(){
  const accs=await db.collection('accounts').get();
  if(accs.size>0)return;
  // Create admin
  await db.collection('accounts').doc('admin').set({username:'admin',password:'admin123',name:'管理员',role:'admin'});
  toast('✅ 系统初始化完成，请使用 admin/admin123 登录');
}

// Auto login check
(async function(){
  const s=sessionStorage.getItem('crm5');
  if(s){
    CU=JSON.parse(s);
    await loadAllData();
    showApp();
  }else{
    await seedData();
  }
})();
</script>
